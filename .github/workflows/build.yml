name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev libc6-dev
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          # Видаляємо стару папку кешу, щоб уникнути конфліктів прав доступу
          rm -rf .buildozer
          # Запуск збірки з примусовим прийняттям ліцензій
          buildozer -v android debug
        env:
          # Ці змінні змушують Buildozer не зупинятися на запиті ліцензій
          ANDROIDSDK_ACCEPT_LICENSES: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
